name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, unit & integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: sailorclawbot
          POSTGRES_USER: sailorclaw
          POSTGRES_PASSWORD: change_me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sailorclaw -d sailorclawbot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://sailorclaw:change_me@localhost:5432/sailorclawbot?schema=public

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: node scripts/run-prisma.mjs generate

      - name: Build all packages
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: Apply migrations
        run: node scripts/run-prisma.mjs migrate deploy

      - name: Integration tests
        run: pnpm --filter @sailorclawbot/database test:integration

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Report known vulnerabilities (non-blocking for now; tighten before launch).
      - name: pnpm audit
        run: pnpm audit --audit-level high || true
